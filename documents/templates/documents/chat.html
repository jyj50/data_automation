{% extends "documents/base.html" %}
{% block content %}
<div class="card">
  <div class="section-title">RAG 챗봇</div>
  <h2>법령 질의</h2>
  <p class="muted">입력한 질문을 ArticleChunk 기반 벡터 검색 후 Qwen으로 답변합니다. LLM/벡터DB가 꺼져 있으면 컨텍스트만 반환됩니다.</p>
  <label for="query">질문</label>
  <textarea id="query" placeholder="예: 제2조의2 내용 요약해줘"></textarea>
  <div class="flex" style="align-items:center;">
    <div style="flex:1;">
      <label for="top_k">검색 개수</label>
      <input type="number" id="top_k" value="5" min="1" max="10">
    </div>
    <button id="btn-ask" style="align-self:flex-end;">질의</button>
  </div>
  <div id="answer" class="doc-row" style="margin-top:12px; white-space:pre-wrap;"></div>
  <div id="context" class="doc-row" style="margin-top:12px; white-space:pre-wrap;"></div>
</div>
<script>
  document.getElementById('btn-ask').addEventListener('click', async () => {
    const query = document.getElementById('query').value;
    const top_k = document.getElementById('top_k').value || 5;
    const answerBox = document.getElementById('answer');
    const ctxBox = document.getElementById('context');
    answerBox.innerText = '질의 중...';
    ctxBox.innerText = '';
    const res = await fetch('/api/chat/', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({query, top_k})
    });
    const data = await res.json();
    if (data.error) {
      answerBox.innerText = '에러: ' + data.error;
      return;
    }
    answerBox.innerText = data.answer || '(빈 응답)';
    const ctxList = data.context || [];
    ctxBox.innerText = ctxList.length ? ctxList.join('\n---\n') : '(컨텍스트 없음)';
  });
</script>
{% endblock %}
