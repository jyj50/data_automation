<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>PDF 문서 파싱 파이프라인</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #22d3ee;
      --border: #1f2937;
      --danger: #f43f5e;
      --success: #22c55e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Pretendard", system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(56,189,248,0.12), transparent 25%),
                  radial-gradient(circle at 80% 10%, rgba(34,211,238,0.15), transparent 22%),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      padding: 24px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      backdrop-filter: blur(8px);
      background: rgba(15,23,42,0.75);
    }
    header h1 { margin: 0; font-size: 20px; letter-spacing: 0.01em; }
    nav a { color: var(--muted); margin-left: 16px; text-decoration: none; font-weight: 600; }
    nav a:hover { color: var(--text); }
    main { max-width: 1200px; margin: 0 auto; padding: 32px 16px 64px; }
    .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 12px 50px rgba(0,0,0,0.35);
    }
    label { display: block; margin-bottom: 8px; color: var(--muted); }
    input[type="file"], input[type="number"], select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #0b1220;
      color: var(--text);
    }
    textarea { min-height: 120px; }
    button {
      margin-top: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: none;
      color: #0b1220;
      font-weight: 700;
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
    }
    button.secondary { background: #0b1220; color: var(--text); border: 1px solid var(--border); }
    button:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(34,211,238,0.28); }
    h2 { margin: 0 0 12px; font-size: 18px; }
    .doc-row { padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; background:#0b1220; }
    .doc-row a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .pill { padding: 4px 10px; border-radius: 999px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; display: inline-block; }
    .status-completed { background: rgba(34,197,94,0.12); color: var(--success); border: 1px solid rgba(34,197,94,0.4); }
    .status-processing { background: rgba(56,189,248,0.12); color: var(--accent); border: 1px solid rgba(56,189,248,0.4); }
    .status-failed { background: rgba(244,63,94,0.12); color: var(--danger); border: 1px solid rgba(244,63,94,0.4); }
    .status-scanned_or_empty { background: rgba(234,179,8,0.12); color: #facc15; border: 1px solid rgba(234,179,8,0.4); }
    .muted { color: var(--muted); font-size: 13px; }
    .messages { margin-top: 8px; }
    .message { padding: 10px 12px; border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--border); }
    .message.error { background: rgba(244,63,94,0.12); border-color: rgba(244,63,94,0.4); color: var(--danger); }
    .message.success { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.4); color: var(--success); }
    .section-title { text-transform: uppercase; font-size: 12px; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }
    .flex { display: flex; gap: 12px; flex-wrap: wrap; }
    .table { width: 100%; border-collapse: collapse; }
    .table th, .table td { border: 1px solid var(--border); padding: 8px; text-align: left; }
  </style>
</head>
<body>
  <header>
    <h1>PDF 문서 파싱 파이프라인</h1>
    <nav>
      <a href="{% url 'documents:home' %}">업로드/파싱</a>
      <a href="{% url 'documents:manage_documents' %}">관리</a>
      <a href="{% url 'documents:chat_page' %}">RAG 챗봇</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
