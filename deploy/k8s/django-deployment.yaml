# NOTE: renamed from Django to FastAPI backend — update image and service references accordingly
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-backend          # TODO: rename service/selector references from rag-django to rag-backend
  namespace: rag-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-backend
  template:
    metadata:
      labels:
        app: rag-backend
    spec:
      imagePullSecrets:
        - name: regcred      # TODO: create with `kubectl create secret docker-registry regcred ...` or remove if using public registry
      containers:
        - name: web
          image: ghcr.io/your-org/data-automation-backend:latest  # TODO: replace with your actual image registry/name
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: rag-config
            - secretRef:
                name: rag-secret
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi          # TODO: increase if loading sentence-transformers model
          volumeMounts:
            - name: media
              mountPath: /app/media
            - name: db
              mountPath: /data
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: rag-media-pvc
        - name: db
          persistentVolumeClaim:
            claimName: rag-db-pvc
